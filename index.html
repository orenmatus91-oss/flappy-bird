        });
        
        // Preview canvas setup
        const previewCanvas = document.getElementById('previewCanvas');
        const pCtx = previewCanvas.getContext('2d');
        let previewBird = null, previewAnim = 0;
        
        function resizePreview() {
            const rect = previewCanvas.parentElement.getBoundingClientRect();
            previewCanvas.width = rect.width * dpr;
            previewCanvas.height = rect.height * dpr;
            previewCanvas.style.width = rect.width + 'px';
            previewCanvas.style.height = rect.height + 'px';
            pCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        window.addEventListener('resize', resizePreview);
        
        function drawPreview(birdData) {
            if (!birdData) return;
            resizePreview();
            const w = previewCanvas.width / dpr, h = previewCanvas.height / dpr;
            pCtx.clearRect(0, 0, w, h);
            pCtx.save();
            pCtx.translate(w/2, h/2);
            
            const s = 40;
            previewAnim += 0.05;
            const wingY = Math.sin(previewAnim) * s * 0.3;
            
            const f = birdData.features || {};
            if (f.glow) {
                pCtx.shadowBlur = 25;
                pCtx.shadowColor = f.glow;
            }
            
            if (f.tail) {
                pCtx.fillStyle = birdData.wing;
                for (let i = -1; i <= 1; i++) {
                    pCtx.beginPath();
                    pCtx.ellipse(-s*1.3, i*s*0.25, s*0.5, s*0.15, i*0.3, 0, Math.PI*2);
                    pCtx.fill();
                }
            }
            
            pCtx.fillStyle = birdData.wing;
            pCtx.beginPath();
            pCtx.moveTo(-s*0.6,0); pCtx.lineTo(-s*1.2,-s*0.4); pCtx.lineTo(-s*1.0,0); pCtx.lineTo(-s*1.2,s*0.4); pCtx.closePath(); pCtx.fill();
            
            const bodyW = f.sleek ? s*1.15 : s*0.9;
            const bodyH = f.sleek ? s*0.6 : s*0.75;
            const bg = pCtx.createRadialGradient(-s*0.2,-s*0.2,0,0,0,s);
            bg.addColorStop(0,birdData.body); bg.addColorStop(0.7,birdData.body); bg.addColorStop(1,birdData.wing);
            pCtx.fillStyle = bg; pCtx.beginPath(); pCtx.ellipse(0,0,bodyW,bodyH,0,0,Math.PI*2); pCtx.fill();
            
            pCtx.fillStyle = birdData.belly;
            pCtx.beginPath(); pCtx.ellipse(0,s*0.25,s*0.6,s*0.4,0,0,Math.PI*2); pCtx.fill();
            
            pCtx.fillStyle = birdData.wing;
            pCtx.save(); pCtx.translate(-s*0.1,s*0.1); pCtx.rotate(Math.sin(previewAnim)*0.25);
            pCtx.beginPath(); pCtx.ellipse(0,wingY,s*0.5,s*0.35,-0.2,0,Math.PI*2); pCtx.fill();
            pCtx.restore();
            
            if (f.crest) {
                pCtx.fillStyle = birdData.wing;
                pCtx.beginPath();
                pCtx.moveTo(-s*0.2, -s*0.7); pCtx.lineTo(0, -s*1.3); pCtx.lineTo(s*0.3, -s*0.7); pCtx.closePath(); pCtx.fill();
            }
            if (f.tufts) {
                pCtx.fillStyle = birdData.wing;
                pCtx.beginPath(); pCtx.ellipse(-s*0.4, -s*0.7, s*0.15, s*0.3, -0.3, 0, Math.PI*2); pCtx.fill();
                pCtx.beginPath(); pCtx.ellipse(s*0.4, -s*0.7, s*0.15, s*0.3, 0.3, 0, Math.PI*2); pCtx.fill();
            }
            if (f.horns) {
                pCtx.fillStyle = birdData.wing;
                pCtx.beginPath(); pCtx.moveTo(-s*0.3, -s*0.6); pCtx.lineTo(-s*0.5, -s*1.1); pCtx.lineTo(-s*0.1, -s*0.65); pCtx.closePath(); pCtx.fill();
                pCtx.beginPath(); pCtx.moveTo(s*0.3, -s*0.6); pCtx.lineTo(s*0.5, -s*1.1); pCtx.lineTo(s*0.1, -s*0.65); pCtx.closePath(); pCtx.fill();
            }
            if (f.mech) {
                pCtx.strokeStyle = birdData.beak; pCtx.lineWidth = 2;
                pCtx.beginPath(); pCtx.moveTo(0, -s*0.7); pCtx.lineTo(0, -s*1.2); pCtx.stroke();
                pCtx.fillStyle = birdData.eye; pCtx.beginPath(); pCtx.arc(0, -s*1.2, s*0.1, 0, Math.PI*2); pCtx.fill();
            }
            
            const eyeSize = f.eyeLarge ? s*0.38 : s*0.28;
            pCtx.fillStyle = '#fff'; pCtx.beginPath(); pCtx.arc(s*0.35,-s*0.25,eyeSize,0,Math.PI*2); pCtx.fill();
            pCtx.fillStyle = birdData.eye || '#2d3436'; pCtx.beginPath(); pCtx.arc(s*0.4,-s*0.25,f.eyeLarge?s*0.18:s*0.14,0,Math.PI*2); pCtx.fill();
            pCtx.fillStyle = '#fff'; pCtx.beginPath(); pCtx.arc(s*0.45,-s*0.3,s*0.06,0,Math.PI*2); pCtx.fill();
            
            if (f.beakLarge) {
                pCtx.fillStyle = birdData.beak;
                pCtx.beginPath(); pCtx.moveTo(s*0.7,-s*0.1); pCtx.lineTo(s*1.3,s*0.05); pCtx.lineTo(s*0.7,s*0.25); pCtx.closePath(); pCtx.fill();
            } else if (f.beakLong) {
                pCtx.fillStyle = birdData.beak;
                pCtx.beginPath(); pCtx.moveTo(s*0.7,-s*0.05); pCtx.lineTo(s*1.4,s*0.02); pCtx.lineTo(s*0.7,s*0.15); pCtx.closePath(); pCtx.fill();
            } else if (f.angular) {
                pCtx.fillStyle = birdData.beak;
                pCtx.beginPath(); pCtx.moveTo(s*0.7,-s*0.1); pCtx.lineTo(s*1.2,s*0.0); pCtx.lineTo(s*0.7,s*0.2); pCtx.closePath(); pCtx.fill();
            } else {
                pCtx.fillStyle = birdData.beak;
                pCtx.beginPath(); pCtx.moveTo(s*0.7,-s*0.05); pCtx.lineTo(s*1.1,s*0.05); pCtx.lineTo(s*0.7,s*0.2); pCtx.closePath(); pCtx.fill();
                pCtx.fillStyle = '#f1c40f';
                pCtx.beginPath(); pCtx.moveTo(s*0.7,-s*0.05); pCtx.lineTo(s*1.0,0); pCtx.lineTo(s*0.7,s*0.05); pCtx.closePath(); pCtx.fill();
            }
            
            pCtx.restore();
        }
        
        function renderShop() {
            document.getElementById('shopCoins').textContent = totalCoins;
            const grid = document.getElementById('shopGrid'); grid.innerHTML = '';
            let selectedShopBird = BIRD_COLORS[selectedBird];
            
            BIRD_COLORS.forEach((bird, i) => {
                const item = document.createElement('div');
                item.className = `shop-item ${i === selectedBird ? 'selected' : ''} ${!bird.unlocked ? 'locked' : ''} rarity-${bird.rarity}`;
                item.innerHTML = `
                    <div class="shop-bird rarity-${bird.rarity}" style="background: linear-gradient(135deg, ${bird.body}, ${bird.wing});" data-rarity=""></div>
                    <div class="shop-name">${bird.name}</div>
                    <div class="shop-ability">${bird.ability || 'No ability'}</div>
                    ${bird.unlocked ? (i === selectedBird ? '<div class="shop-owned">Selected</div>' : '<div class="shop-owned">Owned</div>') : `<div class="shop-cost">🪙 ${bird.cost.toLocaleString()}</div>`}
                `;
                item.addEventListener('click', () => {
                    selectedShopBird = bird;
                    drawPreview(bird);
                    document.getElementById('previewInfo').innerHTML = `
                        <strong style="color:${RARITY_COLORS[bird.rarity]}">${bird.name}</strong> <span style="font-size:0.75em;text-transform:uppercase;opacity:0.6">(${bird.rarity})</span><br>
                        <span style="font-size:0.8em">${bird.desc}</span><br>
                        ${bird.ability ? `<span style="color:#a8b2ff;font-size:0.8em">Ability: ${bird.ability}</span>` : ''}
                    `;
                    
                    if (bird.unlocked) {
                        selectedBird = i; Storage.set('bird', i);
                        renderShop(); renderBirdSelector();
                    } else if (totalCoins >= bird.cost) {
                        totalCoins -= bird.cost; bird.unlocked = true;
                        gameStats.totalSpent += bird.cost;
                        Storage.set('totalCoins', totalCoins);
                        Storage.set('gameStats', gameStats);
                        Storage.set('unlocks', BIRD_COLORS.map(b => b.unlocked));
                        selectedBird = i; Storage.set('bird', i);
                        renderShop(); renderBirdSelector(); updateUI();
                        checkAchievements('unlocks', BIRD_COLORS.filter(b => b.unlocked).length);
                        checkAchievements('spent', gameStats.totalSpent);
                        audio.playUnlock();
                        showToast(`Unlocked ${bird.name}!`);
                        item.classList.add('unlocked-anim');
                        if (bird.rarity === 'legendary' || bird.rarity === 'mythic') {
                            for (let j = 0; j < 30; j++) particles.push(new Particle(canvas.width/dpr/2, canvas.height/dpr/2, 'confetti'));
                        }
                    } else {
                        showToast(`Need ${bird.cost - totalCoins} more coins!`);
                    }
                });
                grid.appendChild(item);
            });
            
            if (selectedShopBird) {
                drawPreview(selectedShopBird);
                document.getElementById('previewInfo').innerHTML = `
                    <strong style="color:${RARITY_COLORS[selectedShopBird.rarity]}">${selectedShopBird.name}</strong> <span style="font-size:0.75em;text-transform:uppercase;opacity:0.6">(${selectedShopBird.rarity})</span><br>
                    <span style="font-size:0.8em">${selectedShopBird.desc}</span><br>
                    ${selectedShopBird.ability ? `<span style="color:#a8b2ff;font-size:0.8em">Ability: ${selectedShopBird.ability}</span>` : ''}
                `;
            }
        }
        
        function renderAchievements() {
            const grid = document.getElementById('achievementsGrid');
            grid.innerHTML = '';
            ACHIEVEMENTS.forEach(a => {
                const card = document.createElement('div');
                card.className = `achievement-card ${a.unlocked ? 'unlocked' : ''}`;
                card.innerHTML = `
                    <div class="achievement-icon">${a.unlocked ? '🏆' : '🔒'}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${a.name}</div>
                        <div class="achievement-desc">${a.desc}</div>
                    </div>
                    <div class="achievement-reward">+${a.reward}🪙</div>
                `;
                grid.appendChild(card);
            });
        }
        
        function openAchievements() {
            document.getElementById('mainMenu').classList.add('hidden');
            document.getElementById('settingsMenu').classList.add('hidden');
            document.getElementById('gameOverMenu').classList.add('hidden');
            document.getElementById('shopMenu').classList.add('hidden');
            document.getElementById('achievementsMenu').classList.remove('hidden');
            renderAchievements();
        }
        document.getElementById('openAchievementsBtn').addEventListener('click', openAchievements);
        document.getElementById('closeAchievementsBtn').addEventListener('click', () => {
            document.getElementById('achievementsMenu').classList.add('hidden');
            document.getElementById('mainMenu').classList.remove('hidden');
        });
        
        function setupToggle(id, key) {
            const el = document.getElementById(id);
            el.classList.toggle('on', settings[key]);
            el.addEventListener('click', () => {
                settings[key] = !settings[key]; el.classList.toggle('on', settings[key]); Storage.set(key, settings[key]);
                if (key === 'music') audio.setMusic(settings.music);
                if (key === 'sfx') audio.setSFX(settings.sfx);
            });
        }
        setupToggle('toggleSFX', 'sfx');
        setupToggle('toggleMusic', 'music');
        setupToggle('toggleParticles', 'particles');
        setupToggle('toggleShake', 'shake');
        
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); currentDifficulty = btn.dataset.diff;
            });
        });
        
        function renderBirdSelector() {
            const c = document.getElementById('birdSelector'); c.innerHTML = '';
            BIRD_COLORS.forEach((color, i) => {
                if (!color.unlocked) return;
                const d = document.createElement('div'); d.className = `bird-option ${i===selectedBird?'selected':''}`;
                d.style.background = `linear-gradient(135deg, ${color.body}, ${color.wing})`;
                d.addEventListener('click', () => { selectedBird = i; Storage.set('bird', i); renderBirdSelector(); });
                c.appendChild(d);
            });
        }
        renderBirdSelector();
        
        // Visibility pause
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && state === STATE.PLAYING) togglePause();
        });
        
        updateUI();
        init();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
